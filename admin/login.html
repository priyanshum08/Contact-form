<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <link rel="stylesheet" href="admin.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-header">
        <div class="shield-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h1>Admin Access</h1>
        <p>Sign in to view contact submissions</p>
      </div>

      <div id="loginError" class="alert-error" hidden></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="admin" autocomplete="username"/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password"/>
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" hidden>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          </span>
        </button>
      </form>

      <a href="../index.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back to contact form
      </a>
    </div>
  </div>

<script>
  // Password toggle
  document.getElementById('pwToggle').addEventListener('click', function() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  });

  // Login form
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn       = document.getElementById('loginBtn');
    const btnText   = btn.querySelector('.btn-text');
    const btnLoader = btn.querySelector('.btn-loader');
    const errBox    = document.getElementById('loginError');

    errBox.hidden = true;
    btn.disabled  = true;
    btnText.textContent = 'Signing in…';
    btnLoader.hidden = false;

    const formData = new FormData();
    formData.append('username', document.getElementById('username').value.trim());
    formData.append('password', document.getElementById('password').value);

    try {
      const res  = await fetch('../php/login.php', { method: 'POST', body: formData });
      const data = await res.json();

      if (data.status === 'success') {
        window.location.href = 'dashboard.php';
      } else {
        errBox.textContent = data.message || 'Login failed.';
        errBox.hidden = false;
        btn.disabled  = false;
        btnText.textContent = 'Sign In';
        btnLoader.hidden = true;
      }
    } catch (err) {
      errBox.textContent = 'Network error. Please try again.';
      errBox.hidden = false;
      btn.disabled  = false;
      btnText.textContent = 'Sign In';
      btnLoader.hidden = true;
    }
  });
</script>
</body>
</html>
